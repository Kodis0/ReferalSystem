# Optional PostgreSQL for local development when you do not want SQLite.
# Usage:
#   docker compose up -d db
# Then set in backend/.env:
#   DB_ENGINE=django.db.backends.postgresql
#   DB_NAME=trs_db
#   DB_USER=postgres
#   DB_PASSWORD=postgres
#   DB_HOST=localhost
#   DB_PORT=5432

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trs_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - referal_pgdata:/var/lib/postgresql/data

volumes:
  referal_pgdata:
