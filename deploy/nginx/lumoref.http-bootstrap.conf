# Use this ONLY for first-time setup before TLS certificates exist.
# After `certbot` (or manual certs), switch to lumoref.conf.
# sudo cp deploy/nginx/lumoref.http-bootstrap.conf /etc/nginx/sites-available/lumoref.conf

upstream lumoref_gunicorn {
    server 127.0.0.1:8001;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.lumoref.ru;
    return 301 http://lumoref.ru$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name lumoref.ru;

    root /var/www/lumoref/app/frontend/build;
    index index.html;

    client_max_body_size 25m;

    location ^~ /users/ {
        proxy_pass http://lumoref_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location ^~ /referrals/ {
        proxy_pass http://lumoref_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location ^~ /public/ {
        proxy_pass http://lumoref_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location ^~ /admin/ {
        proxy_pass http://lumoref_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location ^~ /static/ {
        alias /var/www/lumoref/app/backend/staticfiles/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.lumoref.ru;

    client_max_body_size 25m;

    location /static/ {
        alias /var/www/lumoref/app/backend/staticfiles/;
    }

    location / {
        proxy_pass http://lumoref_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
