# Install: sudo cp to /etc/nginx/sites-available/lumoref.conf && ln -s to sites-enabled
# SSL: sudo certbot --nginx -d lumoref.ru -d www.lumoref.ru -d api.lumoref.ru
# Paths assume repo clone at /var/www/lumoref/app — adjust root/alias if your path differs.

upstream lumoref_gunicorn {
    server 127.0.0.1:8001;
}

# HTTP → HTTPS (leave /.well-known for Certbot renewals)
server {
    listen 80;
    listen [::]:80;
    server_name lumoref.ru www.lumoref.ru api.lumoref.ru;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.lumoref.ru;

    ssl_certificate /etc/letsencrypt/live/lumoref.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lumoref.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://lumoref.ru$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lumoref.ru;

    ssl_certificate /etc/letsencrypt/live/lumoref.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lumoref.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/lumoref/app/frontend/build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.lumoref.ru;

    ssl_certificate /etc/letsencrypt/live/lumoref.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lumoref.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    location /static/ {
        alias /var/www/lumoref/app/backend/staticfiles/;
    }

    location / {
        proxy_pass http://lumoref_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
