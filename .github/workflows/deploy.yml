name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          REACT_APP_GOOGLE_CLIENT_ID: ${{ secrets.REACT_APP_GOOGLE_CLIENT_ID }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          envs: DEPLOY_PATH,REACT_APP_API_URL,REACT_APP_GOOGLE_CLIENT_ID
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            test -n "${DEPLOY_PATH:-}"
            cd "${DEPLOY_PATH}"
            # Bootstrap: VPS may still run an old deploy.sh that uses `git pull` and fails on
            # dirty tracked files. Reset to origin first so the current deploy.sh always runs.
            MAIN_BRANCH="${DEPLOY_MAIN_BRANCH:-main}"
            git fetch origin "${MAIN_BRANCH}"
            git checkout "${MAIN_BRANCH}"
            git reset --hard "origin/${MAIN_BRANCH}"
            chmod +x deploy/deploy.sh
            bash deploy/deploy.sh

